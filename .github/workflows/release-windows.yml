name: Release build (Windows)

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Release Windows
    runs-on: windows-latest

    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      VIZZA_VCPKG_ROOT: C:\vcpkg
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_CACHE: ${{ github.workspace }}\.cache\vcpkg\archives

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          lfs: false

      - uses: ./.github/actions/hydrate-lfs-bundle

      - name: Compute version
        id: version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:RELEASE_TAG -replace '^v', ''
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: laytan/setup-odin@v2
        with:
          token: ${{ github.token }}

      - name: Cache vcpkg packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VIZZA_VCPKG_ROOT }}\installed
            ${{ env.VCPKG_BINARY_CACHE }}
          # v5 intentionally invalidates SDL3 binaries configured before the
          # workflow forced a local rebuild with Vulkan headers available.
          key: ${{ runner.os }}-${{ runner.arch }}-vcpkg-v5-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-vcpkg-v5-

      - name: Install Windows build dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgRoot = $env:VIZZA_VCPKG_ROOT
          $installRoot = Join-Path $vcpkgRoot "installed"
          $installedTripletDir = Join-Path $installRoot $env:VCPKG_DEFAULT_TRIPLET
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:VCPKG_BINARY_SOURCES = "clear;files,$env:VCPKG_BINARY_CACHE,readwrite"

          New-Item -ItemType Directory -Force -Path $env:VCPKG_BINARY_CACHE | Out-Null
          Write-Host "vcpkg cache hit: ${{ steps.vcpkg-cache.outputs.cache-hit }}"
          Write-Host "vcpkg binary cache: $env:VCPKG_BINARY_CACHE"
          if (Test-Path $installedTripletDir) {
            $installedFileCount = (Get-ChildItem $installedTripletDir -Recurse -File).Count
            Write-Host "Restored installed tree: $installedTripletDir ($installedFileCount files)"
          } else {
            Write-Host "No restored installed tree at $installedTripletDir"
          }

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          }

          # SDL decides whether to compile its Windows Vulkan backend during
          # CMake configuration. Install the headers first so that decision is
          # deterministic instead of depending on manifest build ordering.
          Push-Location $vcpkgRoot
          try {
            & "$vcpkgRoot\vcpkg.exe" install vulkan-headers `
              --triplet "$env:VCPKG_DEFAULT_TRIPLET" `
              --x-install-root "$installRoot"
            if ($LASTEXITCODE -ne 0) {
              throw "vcpkg failed to install Vulkan headers"
            }
          } finally {
            Pop-Location
          }

          # SDL's vcpkg ABI does not account for optional Vulkan headers, so a
          # binary-cache hit may have been configured with SDL_VULKAN=OFF even
          # though the headers are installed now. Do not accept a cached SDL
          # archive: configure and build it on this runner after the headers.
          & "$vcpkgRoot\vcpkg.exe" remove "sdl3:$env:VCPKG_DEFAULT_TRIPLET" `
            --x-install-root "$installRoot"
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg failed while removing the cached SDL3 package"
          }

          & "$vcpkgRoot\vcpkg.exe" install "sdl3:$env:VCPKG_DEFAULT_TRIPLET" `
            --x-install-root "$installRoot" `
            --no-binarycaching
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg failed to rebuild SDL3 with Vulkan headers"
          }

          & "$vcpkgRoot\vcpkg.exe" install `
            --triplet "$env:VCPKG_DEFAULT_TRIPLET" `
            --x-install-root "$installRoot"
          if ($LASTEXITCODE -ne 0) {
            throw "vcpkg failed to install Windows build dependencies"
          }

          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "VCPKG_INSTALLED_DIR=$installedTripletDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Cache Slang compiler
        id: slang-cache
        uses: actions/cache/restore@v4
        with:
          path: .tools/slang
          key: ${{ runner.os }}-${{ runner.arch }}-slang-v1-${{ hashFiles('scripts/install_slangc.ps1') }}

      - name: Install Slang compiler
        if: steps.slang-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: pwsh
        run: ./scripts/install_slangc.ps1

      - name: Verify Slang compiler
        shell: pwsh
        run: ./.tools/slang/bin/slangc.exe -version

      - name: Save Slang compiler cache
        if: steps.slang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .tools/slang
          key: ${{ steps.slang-cache.outputs.cache-primary-key }}

      - name: Build Windows app archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ODIN_FLAGS: -o:speed
          WINDOWS_PACKAGE_IDENTITY_NAME: ${{ vars.WINDOWS_PACKAGE_IDENTITY_NAME }}
          WINDOWS_PACKAGE_PUBLISHER: ${{ vars.WINDOWS_PACKAGE_PUBLISHER }}
          WINDOWS_PACKAGE_PUBLISHER_DISPLAY_NAME: ${{ vars.WINDOWS_PACKAGE_PUBLISHER_DISPLAY_NAME }}
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $vcpkgRoot = $env:VIZZA_VCPKG_ROOT
          $env:VCPKG_ROOT = $vcpkgRoot
          $env:VCPKG_INSTALLED_DIR = Join-Path (Join-Path $vcpkgRoot "installed") $env:VCPKG_DEFAULT_TRIPLET

          if ($env:WINDOWS_CERTIFICATE) {
            $pfxPath = Join-Path $env:RUNNER_TEMP "vizza-windows-signing.pfx"
            [System.IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
            "WINDOWS_PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append
            $env:WINDOWS_PFX_PATH = $pfxPath
          }
          ./scripts/package_windows.ps1 -Version $env:VERSION -Msix -VcpkgRoot $vcpkgRoot

      - name: Set artifact name
        id: artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $name = "vizza-$env:RELEASE_TAG-windows-x64"
          $zip = "$name.zip"
          $msix = "$name.msix"
          Copy-Item -Path "dist/Vizza-windows.zip" -Destination "dist/$zip" -Force
          Copy-Item -Path "dist/Vizza-windows.msix" -Destination "dist/$msix" -Force
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip=dist/$zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "msix=dist/$msix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: |
            ${{ steps.artifact.outputs.zip }}
            ${{ steps.artifact.outputs.msix }}
