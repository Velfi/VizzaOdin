name: Release build (macOS)

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Release macOS
    runs-on: macos-latest

    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
      ZELDA_ENGINE_REPOSITORY: ${{ vars.ZELDA_ENGINE_REPOSITORY || 'Velfi/zelda-engine' }}
      ZELDA_ENGINE_REF: ${{ vars.ZELDA_ENGINE_REF || 'main' }}
      ZELDA_ENGINE_ROOT: ${{ github.workspace }}/zelda-engine

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.release_tag }}
          lfs: false

      - name: Check out Zelda Engine
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ZELDA_ENGINE_REPOSITORY }}
          ref: ${{ env.ZELDA_ENGINE_REF }}
          path: zelda-engine
          submodules: recursive
          token: ${{ secrets.ZELDA_ENGINE_TOKEN || github.token }}

      - uses: ./.github/actions/hydrate-lfs-bundle

      - name: Compute version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Homebrew downloads
        id: brew-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-${{ runner.arch }}-homebrew-v1-${{ hashFiles('.github/Brewfile') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-homebrew-v1-

      - name: Install macOS build dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew bundle install --file=.github/Brewfile --no-upgrade

      - name: Save Homebrew download cache
        if: steps.brew-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ steps.brew-cache.outputs.cache-primary-key }}

      - name: Cache Slang compiler
        id: slang-cache
        uses: actions/cache/restore@v4
        with:
          path: .tools/slang
          key: ${{ runner.os }}-${{ runner.arch }}-slang-v1-${{ hashFiles('scripts/install_slangc.sh') }}

      - name: Install Slang compiler
        if: steps.slang-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: make install-slangc

      - name: Verify Slang compiler
        shell: bash
        run: .tools/slang/bin/slangc -version

      - name: Save Slang compiler cache
        if: steps.slang-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .tools/slang
          key: ${{ steps.slang-cache.outputs.cache-primary-key }}

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE:-}" ]]; then
            echo "::error::APPLE_CERTIFICATE secret is empty"
            exit 1
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          CERT_SIZE=$(wc -c < certificate.p12)
          if [[ "$CERT_SIZE" -lt 100 ]]; then
            echo "::error::Decoded certificate.p12 is only ${CERT_SIZE} bytes; APPLE_CERTIFICATE is likely corrupt"
            exit 1
          fi
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -f pkcs12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::No Developer ID Application identity found in imported certificate"
            exit 1
          fi
          echo "MACOS_CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Write Apple notarization API key
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY_CONTENT }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_CONTENT:-}" && -z "${APPLE_API_KEY:-}" ]]; then
            echo "No App Store Connect API key configured; falling back to Apple ID notarization secrets if present."
            exit 0
          fi
          if [[ -z "${APPLE_API_KEY_CONTENT:-}" || -z "${APPLE_API_KEY:-}" ]]; then
            echo "::error::Set both APPLE_API_KEY_CONTENT and APPLE_API_KEY, or neither."
            exit 1
          fi
          mkdir -p "$HOME/.private_keys"
          KEY_PATH="$HOME/.private_keys/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s\n' "$APPLE_API_KEY_CONTENT" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build signed and notarized app archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ODIN_FLAGS: -o:speed
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/package_macos.sh --version "$VERSION"

      - name: Set artifact name
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          NAME="vizza-${RELEASE_TAG}-macos"
          FILENAME="${NAME}.zip"
          cp dist/Vizza-macos.zip "dist/${FILENAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "filename=dist/${FILENAME}" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.filename }}
