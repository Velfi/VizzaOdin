name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-release, e.g. v0.1.0 or v0.2.0-0"
        required: true

permissions:
  contents: write
  actions: write

jobs:
  lfs-assets:
    uses: ./.github/workflows/prepare-lfs-assets.yml
    with:
      git_ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

  release-macos:
    needs: lfs-assets
    uses: ./.github/workflows/release-macos.yml
    with:
      release_tag: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    secrets: inherit

  create-release:
    needs: release-macos
    runs-on: ubuntu-latest

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: artifacts
          merge-multiple: true

      - name: Drop CI-only LFS bundle from release uploads
        shell: bash
        run: find artifacts -name '*.lfsbundle' -delete

      - name: Prerelease if tag has semver pre-release
        id: prerelease
        shell: bash
        run: |
          set -euo pipefail
          V="${RELEASE_TAG#v}"
          if [[ "$V" == *-* ]]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            echo "value=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.prerelease.outputs.value }}" == "true" ]]; then
            python3 scripts/prerelease_notes.py "$RELEASE_TAG" > release-notes.md
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          elif python3 scripts/aggregate_release_notes.py "$RELEASE_TAG" > release-notes.md; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "no CHANGELOG section for $RELEASE_TAG; falling back to auto-generated notes" >&2
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release with CHANGELOG body
        if: steps.notes.outputs.have_notes == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: VizzaOdin ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          body_path: release-notes.md
          files: artifacts/*

      - name: Create GitHub Release with auto-generated notes
        if: steps.notes.outputs.have_notes != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: VizzaOdin ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.value == 'true' }}
          generate_release_notes: true
          files: artifacts/*
